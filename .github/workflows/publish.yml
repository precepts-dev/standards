name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate standards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24  # Active LTS — aligns with release job
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validator (strict)
        run: npm run validate:strict

  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write        # push release commit + tag
      issues: write          # comment on resolved issues
      pull-requests: write   # comment on merged PRs
      id-token: write        # OIDC Trusted Publishing (npm provenance)

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: precepts-dev
          repositories: "standards,platform"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24  # Node 24 required for npm OIDC Trusted Publishing
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub API (releases, PR comments)
          GH_TOKEN: ${{ steps.app-token.outputs.token }}  # git push + platform dispatch
          NPM_CONFIG_PROVENANCE: "true"
