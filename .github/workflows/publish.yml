name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  validate:
    name: Validate standards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run validator (strict)
        run: npm run validate:strict

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: version-check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @precepts/standards version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURRENT (skipping publish)"
          fi

      - name: Publish to npm with provenance
        if: steps.version-check.outputs.changed == 'true'
        run: npm publish --access public --provenance

      - name: Notify platform repo
        if: steps.version-check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh api repos/precepts-dev/platform/dispatches \
            -f event_type=standards-published \
            -f "client_payload[version]=$VERSION"
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_PAT }}
